<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password - Project Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #007AFF;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #007AFF;
        }
        
        input.error {
            border-color: #FF3B30;
        }
        
        .error-message {
            color: #FF3B30;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: #34C759;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .info-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover:not(:disabled) {
            background: #0051D5;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #007AFF;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Project Planner</h1>
            <p>Reset Your Password</p>
        </div>
        
        <div id="requestResetForm">
            <div class="info-box">
                Enter your email address and we'll send you a password reset link.
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email address" />
                <div class="error-message" id="emailError"></div>
            </div>
            
            <button class="btn" id="sendResetBtn" onclick="sendPasswordReset()">
                Send Reset Link
            </button>
            
            <div class="back-link">
                <a href="javascript:history.back()">← Back to login</a>
            </div>
        </div>
        
        <div id="resetCompleteView" style="display: none; text-align: center;">
            <div style="font-size: 48px; margin-bottom: 20px;">📧</div>
            <h2 style="color: #007AFF; margin-bottom: 10px;">Check Your Email</h2>
            <p style="color: #666; margin-bottom: 20px;">
                We've sent a password reset link to <strong id="sentEmail"></strong>
            </p>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">
                Click the link in the email to reset your password. The link will expire in 1 hour.
            </p>
            <div class="back-link">
                <a href="javascript:location.reload()">Send another email</a>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCPafzxnt3q2Q_xQ4N6BYrhNyUOJSiL1Yc",
            authDomain: "project-planner-f986c.firebaseapp.com",
            projectId: "project-planner-f986c",
            storageBucket: "project-planner-f986c.appspot.com",
            messagingSenderId: "980527300983",
            appId: "1:980527300983:web:project-planner"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        window.sendPasswordReset = async function() {
            const email = document.getElementById('email').value.trim();
            const emailError = document.getElementById('emailError');
            const errorMessage = document.getElementById('errorMessage');
            const sendResetBtn = document.getElementById('sendResetBtn');
            const emailInput = document.getElementById('email');
            
            // Clear previous errors
            emailError.classList.remove('show');
            errorMessage.textContent = '';
            
            // Validate email
            if (!email) {
                showError(emailError, 'Please enter your email address');
                emailInput.classList.add('error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError(emailError, 'Please enter a valid email address');
                emailInput.classList.add('error');
                return;
            }
            
            emailInput.classList.remove('error');
            sendResetBtn.disabled = true;
            sendResetBtn.innerHTML = '<span class="loading"></span> Sending...';
            
            try {
                // Must match a domain listed in Firebase Console → Authentication → Settings → Authorized domains
                const continueUrl = 'https://projectplanner.us/reset-password-complete.html';
                await sendPasswordResetEmail(auth, email, {
                    url: continueUrl,
                    handleCodeInApp: false
                });
                
                // Show success
                document.getElementById('requestResetForm').style.display = 'none';
                document.getElementById('resetCompleteView').style.display = 'block';
                document.getElementById('sentEmail').textContent = email;
                
            } catch (err) {
                const code = err && err.code;
                const msg = (err && err.message) ? String(err.message) : '';
                console.error('Password reset error:', code, msg, err);
                
                let errorMsg = 'Failed to send reset email. Please try again.';
                if (code === 'auth/user-not-found') {
                    errorMsg = 'No account found with this email address.';
                } else if (code === 'auth/invalid-email') {
                    errorMsg = 'Invalid email address.';
                } else if (code === 'auth/too-many-requests') {
                    errorMsg = 'Too many requests. Please wait a few minutes before trying again.';
                } else if (code === 'auth/network-request-failed') {
                    errorMsg = 'Network error. Check your connection and try again.';
                } else if (code === 'auth/operation-not-allowed') {
                    errorMsg = 'Password reset is not enabled. Please contact support.';
                } else if (code === 'auth/invalid-continue-uri' || code === 'auth/unauthorized-domain') {
                    errorMsg = 'This website is not authorized for password reset. Please use the link from the Project Planner app or contact support.';
                } else if (msg) {
                    errorMsg = msg;
                }
                
                showError(errorMessage, errorMsg);
                sendResetBtn.disabled = false;
                sendResetBtn.innerHTML = 'Send Reset Link';
            }
        };
        
        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
            setTimeout(() => {
                element.classList.remove('show');
            }, 15000);
        }
        
        // Auto-fill email from URL if provided
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        if (emailParam) {
            document.getElementById('email').value = emailParam;
        }
    </script>
</body>
</html>
